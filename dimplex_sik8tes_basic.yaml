  template:
    - sensor:
        # ---------- Statusmeldungen (Register 103) ----------
        - name: "Dimplex Status Text"
          unique_id: "dimplex_status_text"
          icon: mdi:information
          state: >
            {% set code = states('sensor.dimplex_statusmeldungen') | int(-1) %}
            {% set status_map = {
              0:  'Aus',
              1:  'Wärmepumpe aktiv – Heizbetrieb',
              2:  'Heizbetrieb',
              3:  'Wärmepumpe aktiv – Schwimmbad',
              4:  'Warmwasserbereitung',
              5:  'Kühlbetrieb (WP + 2. Wärmeerzeuger)',
              6:  'Schwimmbad + 2. Wärmeerzeuger',
              7:  'Warmwasser + 2. Wärmeerzeuger',
              8:  'Primärpumpenvorlauf',
              9:  'Heizungsentleerung',
              10: 'Abtauung (gesperrt – siehe Sperren)',
              11: 'Durchflussüberwachung / untere Einsatzgrenze',
              12: 'Niederdruckgrenze',
              13: 'Niederdruckabschaltung',
              14: 'Hochdrucksicherheit',
              15: 'Einschaltverzögerung',
              16: 'Mindeststillstandszeit',
              17: 'Netzlastbegrenzung',
              18: 'Durchflussüberwachung',
              19: '2. Wärmeerzeuger aktiv',
              20: 'Niederdruck (Sole/Quelle)',
              21: 'Wärmepumpe aktiv – Abtauung',
              22: 'Obere Einsatzgrenze',
              23: 'Externe Sperre',
              24: 'Kühlbetrieb Umschaltverzögerung / Kühlbetrieb',
              25: 'Frostschutz (Kühlbetrieb)',
              26: 'Vorlauftemperaturbegrenzung',
              27: 'Taupunktüberwachung',
              28: 'Taupunkt',
              29: 'Passiv Kühlen',
              30: 'Sperre (siehe Sperrregister)'
            } %}
            {{ status_map.get(code, 'Unbekannter Status (Code %s)' | format(code)) }}
  
        # ---------- Sperrmeldungen (Register 104) ----------
        - name: "Dimplex Sperre Text"
          unique_id: "dimplex_sperre_text"
          icon: mdi:lock-alert
          state: >
            {% set code = states('sensor.dimplex_sperrmeldungen') | int(0) %}
            {% set lock_map = {
              0:  'Keine Sperre',
              1:  'Hochtemperatur-Einsatzgrenze / Außentemperatur',
              2:  'Volumenstrom / WP-Einsatzgrenze / bivalent-alternativ',
              3:  'Regenerativ / bivalent-regenerativ',
              4:  'Rücklauftemperaturbegrenzung',
              5:  'Funktionsprüfung / WW-Nachheizung / Warmwasser',
              6:  'Hochtemperatur-Einsatzgrenze / Systemprüfung',
              7:  'Systemprüfung / EVU-Sperre',
              8:  'Verzögerung Kühlbetriebsumschaltung',
              9:  'Pumpenvorlauf / Hochdruck',
              10: 'Mindeststillstandszeit / Niederdruck',
              11: 'Netzlastbegrenzung / Durchfluss',
              12: 'Einschaltverzögerung / Sanftanlauf',
              13: 'WW-Nachheizung',
              14: 'Regenerativ',
              15: 'EVU-Sperre',
              16: 'Sanftanlauf',
              17: 'Durchfluss',
              18: 'WP-Einsatzgrenze',
              19: 'Hochdruck',
              20: 'Niederdruck',
              21: 'Wärmequellen-Einsatzgrenze',
              23: 'Systemgrenze',
              24: 'Primärkreislauf-Auslastung',
              25: 'Externe Sperre',
              31: 'Aufwärmphase',
              33: 'EvD-Initialisierung',
              34: '2. Wärmeerzeuger freigegeben',
              35: 'Störung (siehe Störungsregister)',
              36: 'Pumpenvorlauf',
              37: 'Mindeststillstandszeit',
              38: 'Netzlastbegrenzung',
              39: 'Einschaltverzögerung',
              40: 'Wärmequellen-Einsatzgrenze',
              41: 'Externe Sperre',
              42: '2. Wärmeerzeuger',
              43: 'Störung (siehe Störungsregister)'
            } %}
            {{ lock_map.get(code, 'Unbekannte Sperre (Code %s)' | format(code)) }}
  
        # ---------- Störmeldungen (Register 105) ----------
        - name: "Dimplex Störung Text"
          unique_id: "dimplex_stoerung_text"
          icon: mdi:alert-circle
          state: >
            {% set code = states('sensor.dimplex_stoermeldungen') | int(0) %}
            {% set fault_map = {
              0:  'Keine Störung',
              1:  'Störung N17.1',
              2:  'Störung N17.2',
              3:  'Störung N17.3 / Verdichterbelastung',
              4:  'Störung N17.4 / Codierung',
              5:  'Niederdruck',
              6:  'Elektronisches Expansionsventil / Frostschutz',
              7:  'Außenfühler Kurzschluss oder Unterbrechung',
              8:  'Rücklauffühler Kurzschluss oder Unterbrechung',
              9:  'WW-Fühler Kurzschluss oder Unterbrechung',
              10: 'WPIO / Frostschutzfühler Kurzschluss oder Unterbrechung',
              11: '2. Heizkreisfühler Kurzschluss oder Unterbrechung',
              12: 'Inverter / Frostschutzfühler Kurzschluss oder Unterbrechung',
              13: 'WQIF / Niederdruck Sole',
              14: 'Motorschutz Primärpumpe',
              15: 'Sensorfehler / Durchfluss',
              16: 'Niederdruck Sole / Warmwasser',
              17: 'Hochdruck',
              19: 'Primärkreisfehler / Heißgasthermostat',
              20: 'Abtaufehler / Kühlbetrieb-Einsatzgrenze',
              21: 'Niederdruck Sole Fehler',
              22: 'Warmwasserfehler',
              23: 'Verdichterbelastungsfehler / Temperaturdifferenz',
              24: 'Codierungsfehler',
              25: 'Niederdruckfehler',
              26: 'Frostschutzfehler',
              28: 'Hochdruckfehler',
              29: 'Temperaturdifferenzfehler',
              30: 'Heißgasthermostatfehler',
              31: 'Durchflussfehler'
            } %}
            {{ fault_map.get(code, 'Unbekannte Störung (Code %s)' | format(code)) }}
  
        # ---------- Betriebsmodus als Text ----------
        - name: "Dimplex Betriebsmodus Text"
          unique_id: "dimplex_betriebsmodus_text"
          icon: mdi:home-thermometer
          state: >
            {% set code = states('sensor.dimplex_betriebsmodus') | int(-1) %}
            {% set mode_map = {
              0: 'Sommer',
              1: 'Winter',
              2: 'Urlaub',
              3: 'Party',
              4: '2. Wärmeerzeuger',
              5: 'Kühlen'
            } %}
            {{ mode_map.get(code, 'Unbekannt (Code %s)' | format(code)) }}
  
        # ---------- SG Ready Modus als Text ----------
        - name: "Dimplex SG Ready Text"
          unique_id: "dimplex_sg_ready_text"
          icon: mdi:solar-power
          state: >
            {% set code = states('sensor.dimplex_sg_ready') | int(0) %}
            {% set sg_map = {
              0:  'Hardware',
              10: 'Gelb',
              11: 'Grün',
              12: 'Rot',
              13: 'Tiefgrün'
            } %}
            {{ sg_map.get(code, 'Unbekannt (Code %s)' | format(code)) }}
  
        - name: "Dimplex SG Ready Eingangszustand"
          unique_id: "dimplex_sg_ready_eingang"
          icon: mdi:solar-power
          state: >
            {% set sg1 = 1 if is_state('binary_sensor.dimplex_sg_eingang1', 'on') else 0 %}
            {% set sg2 = 1 if is_state('binary_sensor.dimplex_sg_eingang2', 'on') else 0 %}
            {% if sg1 == 0 and sg2 == 0 %}
              Gelb
            {% elif sg1 == 0 and sg2 == 1 %}
              Rot
            {% elif sg1 == 1 and sg2 == 0 %}
              Grün
            {% elif sg1 == 1 and sg2 == 1 %}
              Tiefgrün
            {% else %}
              Unbekannt
            {% endif %}
  
      binary_sensor:
        - name: "Dimplex Sperre Aktiv"
          unique_id: "dimplex_sperre_aktiv"
          device_class: problem
          state: >
            {{ states('sensor.dimplex_sperrmeldungen') | int(0) != 0 }}
  
        - name: "Dimplex Störung Aktiv"
          unique_id: "dimplex_stoerung_aktiv"
          device_class: problem
          state: >
            {{ states('sensor.dimplex_stoermeldungen') | int(0) != 0 }}
  
  input_select:
    sg_ready_mode:
      name: SG Ready Modus
      options:
        - Hardware
        - Gelb
        - Grün
        - Rot
        - Tiefgrün
      icon: mdi:solar-power
